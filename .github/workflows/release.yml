name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: windows-latest
            args: ''
          - platform: ubuntu-22.04
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxtst-dev \
            libxdo-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app and create Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Dadumi ${{ github.ref_name }}'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Re-sign and repackage macOS DMG with entitlements
        if: matrix.platform == 'macos-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          APP=$(find src-tauri/target -name "Dadumi.app" -type d | head -1)
          [ -z "$APP" ] && echo "Dadumi.app not found" && exit 1

          codesign --force --deep --sign - \
            --entitlements src-tauri/Entitlements.plist \
            "$APP"
          echo "Re-signed: $APP"

          codesign -dv --entitlements - "$APP" 2>&1

          VERSION=$(defaults read "$(pwd)/$APP/Contents/Info.plist" CFBundleShortVersionString)
          DMG_NAME="Dadumi_${VERSION}_aarch64.dmg"
          DMG_PATH="$(dirname "$APP")/$DMG_NAME"

          hdiutil create -volname "Dadumi" \
            -srcfolder "$APP" \
            -ov -format UDZO \
            "$DMG_PATH"
          echo "Created DMG: $DMG_PATH"

          OLD_DMG=$(gh release view "$TAG" --json assets --jq '.assets[].name' | grep "_aarch64.dmg" || true)
          if [ -n "$OLD_DMG" ]; then
            gh release delete-asset "$TAG" "$OLD_DMG" --yes 2>/dev/null || true
          fi

          gh release upload "$TAG" "$DMG_PATH" --clobber
          echo "Uploaded: $DMG_NAME"

